repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (security-focused)
        entry: ruff check --fix
        language: system
        types: [python]
        exclude: ^(tfp_ui/|tfp_testbed/|tfp_simulator/)
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        exclude: ^(tfp_ui/screens/screen_stubs\.py)
  - repo: local
    hooks:
      - id: bandit
        name: bandit (security scan)
        entry: bandit
        args: ["--configfile", "bandit.ini", "-r", "tfp_core/", "tfp_security/", "tfp_transport/", "tfp_foundation-protocol/tfp_client/lib/security/"]
        language: system
        types: [python]
