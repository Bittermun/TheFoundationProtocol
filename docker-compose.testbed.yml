version: '3.8'

services:
  # IPFS (Kubo) for content pinning and retrieval
  tfp-ipfs:
    image: ipfs/kubo:latest
    container_name: tfp-ipfs
    ports:
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - tfp-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    container_name: tfp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tfp-network
    deploy:
      resources:
        limits:
          memory: 128M

  # Nostr Relay for cross-node discovery
  tfp-relay:
    image: scsibug/nostr-rs-relay:latest
    container_name: tfp-relay
    ports:
      - "8008:8080"
    networks:
      - tfp-network
    deploy:
      resources:
        limits:
          memory: 128M

  tfp-node-1:
    build:
      context: ./tfp-foundation-protocol
      dockerfile: Dockerfile.demo
    container_name: tfp-node-1
    ports:
      - "9001:8000"
    restart: unless-stopped
    volumes:
      - tfp_data_1:/data
    environment:
      - TFP_DB_PATH=/data/pib.db
      - TFP_IPFS_API_URL=http://tfp-ipfs:5001
      - TFP_REDIS_URL=redis://tfp-redis:6379/0
      - NOSTR_RELAY_URL=ws://tfp-relay:8080
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    depends_on:
      - tfp-ipfs
      - redis
      - tfp-relay
    networks:
      - tfp-network
  tfp-node-2:
