# fly.toml app configuration file for TFP Production
#
# This configuration is for production deployments with TFP_MODE=production
# Required environment variables (set via fly secrets):
# - TFP_PEER_SECRET: Shared secret for peer authentication
# - TFP_ADMIN_DEVICE_IDS: Comma-separated list of authorized admin device IDs
# - NOSTR_PRIVATE_KEY: Private key for Nostr publishing (if enabled)
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tfp-production'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  TFP_MODE = 'production'
  TFP_DB_PATH = '/data/tfp.db'
  NOSTR_RELAY_URL = 'wss://relay.damus.io'
  TFP_NOSTR_PUBLISH_ENABLED = '0'

[mounts]
  source = 'tfp_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
