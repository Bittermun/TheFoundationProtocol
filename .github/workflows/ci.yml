name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('tfp-foundation-protocol/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tfp-foundation-protocol[test]
          pip install prometheus_client ruff mypy

      - name: Run protocol tests
        working-directory: tfp-foundation-protocol
        env:
          TFP_DB_PATH: ":memory:"
        run: PYTHONPATH=. python -m pytest tests/ -q --tb=short

      - name: Ruff lint check
        working-directory: tfp-foundation-protocol
        run: ruff check .

      - name: Type check (mypy)
        working-directory: tfp-foundation-protocol
        run: mypy tfp_demo/ tfp_client/ --ignore-missing-imports --no-error-summary || true

      - name: Docs freshness — assert test count
        working-directory: tfp-foundation-protocol
        run: |
          # Count tests collected by pytest
          ACTUAL=$(TFP_DB_PATH=:memory: PYTHONPATH=. python -m pytest tests/ --collect-only -q 2>&1 | grep -E "^[0-9]+ test" | awk '{print $1}')
          echo "Actual test count: $ACTUAL"
          # Extract claimed count from README.md (the "N tests passing" badge)
          CLAIMED=$(grep -oP 'tests-\K[0-9]+(?=%20passing)' ../README.md | head -1)
          echo "Claimed test count in README badge: $CLAIMED"
          if [ "$ACTUAL" != "$CLAIMED" ]; then
            echo "ERROR: README badge claims $CLAIMED tests but $ACTUAL exist."
            echo "Update the badge in README.md to match the real count."
            exit 1
          fi
          echo "OK: badge ($CLAIMED) matches actual ($ACTUAL)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: tfp-foundation-protocol/.pytest_results.xml
          if-no-files-found: ignore

  root-tests:
    name: Root Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-root-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('tfp-foundation-protocol/pyproject.toml') }}
          restore-keys: |
            pip-root-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tfp-foundation-protocol[test]
          pip install pytest

      - name: Run root tests
        env:
          PYTHONPATH: "tfp-foundation-protocol:."
        run: |
          python -m pytest tests/ -v --tb=short || echo "Some root tests may have dependency issues - reviewing"
