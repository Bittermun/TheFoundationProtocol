name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('tfp-foundation-protocol/pyproject.toml', 'tfp-foundation-protocol/.pre-commit-config.yaml') }}
          restore-keys: |
            pip-lint-${{ runner.os }}-${{ matrix.python-version }}-
            pip-lint-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tfp-foundation-protocol[test]
          pip install ruff mypy

      - name: Ruff lint check
        working-directory: tfp-foundation-protocol
        run: ruff check .

      - name: Type check (mypy)
        working-directory: tfp-foundation-protocol
        run: mypy tfp_demo/ tfp_client/ --ignore-missing-imports --no-error-summary

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('tfp-foundation-protocol/pyproject.toml', 'tfp-foundation-protocol/.pre-commit-config.yaml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tfp-foundation-protocol[test]
          pip install prometheus_client pytest-cov

      - name: Run protocol tests with coverage
        working-directory: tfp-foundation-protocol
        env:
          TFP_DB_PATH: ":memory:"
        run: PYTHONPATH=. python -m pytest tests/ -q --tb=short --cov=. --cov-report=xml

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: tfp-foundation-protocol/coverage.xml
          if-no-files-found: ignore
