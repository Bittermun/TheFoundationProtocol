name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tfp-foundation-protocol/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tfp-foundation-protocol/requirements.txt
          pip install prometheus_client

      - name: Run protocol tests
        working-directory: tfp-foundation-protocol
        run: PYTHONPATH=. python -m pytest tests/ -q --tb=short

      - name: Docs freshness — assert test count
        working-directory: tfp-foundation-protocol
        run: |
          # Count tests collected by pytest
          ACTUAL=$(TFP_DB_PATH=:memory: PYTHONPATH=. python -m pytest tests/ --collect-only -q 2>&1 | grep -E "^[0-9]+ test" | awk '{print $1}')
          echo "Actual test count: $ACTUAL"
          # Extract claimed count from README.md (the "N tests passing" badge)
          CLAIMED=$(grep -oP 'tests-\K[0-9]+(?=%20passing)' ../README.md | head -1)
          echo "Claimed test count in README badge: $CLAIMED"
          if [ "$ACTUAL" != "$CLAIMED" ]; then
            echo "ERROR: README badge claims $CLAIMED tests but $ACTUAL exist."
            echo "Update the badge in README.md to match the real count."
            exit 1
          fi
          echo "OK: badge ($CLAIMED) matches actual ($ACTUAL)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: tfp-foundation-protocol/.pytest_results.xml
          if-no-files-found: ignore
