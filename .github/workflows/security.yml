name: Security & Quality Checks

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('tfp-foundation-protocol/pyproject.toml', 'tfp-foundation-protocol/.pre-commit-config.yaml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.11-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install bandit safety ruff semgrep pre-commit

      - name: Run pre-commit hooks
        working-directory: tfp-foundation-protocol
        run: pre-commit run --all-files

      - name: Run Bandit
        run: bandit -r tfp_core/ tfp_security/ tfp_transport/ tfp-foundation-protocol/tfp_client/lib/security/ tfp-foundation-protocol/tfp_demo/ -c bandit.ini --severity-level=medium

      - name: Safety Check
        run: safety scan --full-report || true

      - name: Semgrep
        run: semgrep --config=semgrep.yml --error --severity=ERROR

  concurrency-tests:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e tfp-foundation-protocol[test]
          pip install prometheus_client pytest-xdist
      - name: Run concurrency tests
        working-directory: tfp-foundation-protocol
        run: |
          TFP_DB_PATH=:memory: PYTHONPATH=. pytest -m "concurrency" --maxfail=3 -q
