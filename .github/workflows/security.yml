name: Security & Quality Checks

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    # Run full security scans weekly on Sundays at 3am UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  quick-checks:
    name: Quick Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run quick checks on PRs and pushes to main, not on schedule
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-quick-${{ runner.os }}-3.11-${{ hashFiles('tfp-foundation-protocol/pyproject.toml', 'tfp-foundation-protocol/.pre-commit-config.yaml') }}
          restore-keys: |
            pip-quick-${{ runner.os }}-3.11-
            pip-quick-${{ runner.os }}-

      - name: Install dependencies
        run: pip install pre-commit ruff mypy bandit

      - name: Run pre-commit hooks
        working-directory: tfp-foundation-protocol
        run: pre-commit run --all-files

  full-security:
    name: Full Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on schedule or manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-security-${{ runner.os }}-3.11-${{ hashFiles('tfp-foundation-protocol/pyproject.toml', 'tfp-foundation-protocol/.pre-commit-config.yaml') }}
          restore-keys: |
            pip-security-${{ runner.os }}-3.11-
            pip-security-${{ runner.os }}-

      - name: Install dependencies
        run: pip install bandit safety ruff semgrep

      - name: Run Bandit
        run: bandit -r tfp_core/ tfp_security/ tfp_transport/ tfp-foundation-protocol/tfp_client/lib/security/ tfp-foundation-protocol/tfp_demo/ -c bandit.ini --severity-level=medium

      - name: Safety Check
        continue-on-error: true
        run: safety check --full-report

      - name: Semgrep
        run: semgrep --config=semgrep.yml --error --severity=ERROR

  concurrency-tests:
    name: Concurrency Tests
    runs-on: ubuntu-latest
    # Run on PRs and pushes to main
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e tfp-foundation-protocol[test]
          pip install prometheus_client pytest-xdist
      - name: Run concurrency tests
        working-directory: tfp-foundation-protocol
        run: |
          TFP_DB_PATH=:memory: PYTHONPATH=. pytest -m "concurrency" --maxfail=3 -q
