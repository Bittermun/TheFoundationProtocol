name: OpenSSF Scorecard

on:
  # Run weekly on Sunday at 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"
  # Allow manual trigger
  workflow_dispatch:
  # Run on pushes to main to catch immediate regressions
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # needed to upload SARIF results
      id-token: write           # needed for OIDC token for publishing results

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # Run the Python SecurityScorecard module to track score over time
  python-scorecard:
    name: Python security scorecard check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run TFP security scorecard
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          try:
              from tfp_core.audit.security_scorecard import SecurityScorecard
              sc = SecurityScorecard(threshold=5.0)
              results = sc.run(repo_path=".")
              print(f"Security score: {results.get('score', 'N/A')}")
              print(f"Passed threshold: {results.get('passed', False)}")
          except Exception as e:
              print(f"Scorecard check skipped (not blocking): {e}")
          EOF
