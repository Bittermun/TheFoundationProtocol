name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tfp-foundation-protocol[test]
          pip install build ruff mypy pytest-cov prometheus_client

      - name: Run linting
        working-directory: tfp-foundation-protocol
        run: |
          ruff check .
          mypy tfp_demo/ tfp_client/ --ignore-missing-imports --no-error-summary

      - name: Run tests
        working-directory: tfp-foundation-protocol
        env:
          TFP_DB_PATH: ":memory:"
        run: |
          PYTHONPATH=. python -m pytest tests/ -q --tb=short --cov=. --cov-report=xml

      - name: Build package
        run: |
          cd tfp-foundation-protocol
          python -m build

      - name: Generate checksums
        run: |
          cd tfp-foundation-protocol/dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            tfp-foundation-protocol/dist/*.whl
            tfp-foundation-protocol/dist/*.tar.gz
            tfp-foundation-protocol/dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual run)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: release-artifacts-${{ inputs.version }}
          path: |
            tfp-foundation-protocol/dist/*.whl
            tfp-foundation-protocol/dist/*.tar.gz
            tfp-foundation-protocol/dist/checksums.txt
