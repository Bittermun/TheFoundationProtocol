version: '3.8'

services:
  # IPFS (Kubo) for content pinning and retrieval
  tfp-ipfs:
    image: ipfs/kubo:latest
    container_name: tfp-ipfs
    ports:
      - "5001:5001"
      - "8080:8080"
      - "4001:4001"
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_export:/export
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    networks:
      - tfp-network

  # Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    container_name: tfp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - tfp-network

  # TFP Node 1
  tfp-node-1:
    build: ../../tfp-foundation-protocol
    container_name: tfp-node-1
    ports:
      - "8001:8000"
    restart: unless-stopped
    volumes:
      - tfp_data_1:/data
    environment:
      - TFP_DB_PATH=/data/pib.db
      - TFP_IPFS_API_URL=http://tfp-ipfs:5001
      - TFP_REAL_ADAPTERS=1
      - NOSTR_RELAY=${NOSTR_RELAY:-}
      - TFP_EARN_RATE_MAX=${TFP_EARN_RATE_MAX:-10}
      - TFP_EARN_RATE_WINDOW=${TFP_EARN_RATE_WINDOW:-60}
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - tfp-ipfs
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - tfp-network

  # TFP Node 2
  tfp-node-2:
