      - TFP_EARN_RATE_MAX=${TFP_EARN_RATE_MAX:-10}
      - TFP_EARN_RATE_WINDOW=${TFP_EARN_RATE_WINDOW:-60}
      - PYTHONPATH=/app
    healthcheck:
