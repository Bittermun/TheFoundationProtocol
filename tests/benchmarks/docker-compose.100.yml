version: '3.8'

services:
  # IPFS (Kubo) for content pinning and retrieval
  tfp-ipfs:
    image: ipfs/kubo:latest
    container_name: tfp-ipfs
    ports:
      - "5001:5001"
      - "8080:8080"
      - "4001:4001"
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_export:/export
    networks:
      - tfp-network

  # Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    container_name: tfp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tfp-network

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: tfp-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - redis
      - tempo
    networks:
      - tfp-network

  # Tempo for distributed tracing
  tempo:
    image: grafana/tempo:2.4.0
    container_name: tfp-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - tfp-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tfp-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector
    networks:
      - tfp-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: tfp-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tfp-admin-password-change-me
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
    networks:
      - tfp-network

  tfp-demo-1:
    build:
      context: ../../tfp-foundation-protocol
      dockerfile: Dockerfile.demo
    container_name: tfp-demo-node-1
    ports:
      - "8001:8000"
    restart: unless-stopped
    volumes:
      - tfp_data_1:/data
    environment:
      - TFP_DB_PATH=/data/pib.db
      - TFP_IPFS_API_URL=http://tfp-ipfs:5001
      - NOSTR_RELAY=${NOSTR_RELAY:-}
      - TFP_EARN_RATE_MAX=${TFP_EARN_RATE_MAX:-10}
      - TFP_EARN_RATE_WINDOW=${TFP_EARN_RATE_WINDOW:-60}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - tfp-ipfs
      - redis
    networks:
      - tfp-network
  tfp-demo-2:
    build:
      context: ../../tfp-foundation-protocol
