rules:
  - id: avoid-random-in-security
    patterns:
      - pattern: |
          import random
          ...
          random.$FUNC(...)
    message: "Do not use 'random' module in security-critical code. Use secrets, os.urandom, or PUF-derived entropy."
    paths:
      include:
        - tfp_security/
        - tfp_core/security/
        - tfp-foundation-protocol/tfp_client/lib/security/
        - tfp-foundation-protocol/tfp_client/lib/zkp/
    severity: ERROR

  - id: nostr-event-validation
    pattern: |
      Event(...)
    message: "Manually verify Nostr events validate id, sig, and created_at ordering to prevent replay attacks."
    paths:
      include:
        - tfp-foundation-protocol/tfp_client/lib/bridges/
    severity: WARNING
