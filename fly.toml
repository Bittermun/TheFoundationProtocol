# fly.toml app configuration file generated for tfp on 2026-04-14T12:53:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tfp'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  TFP_MODE = 'demo'
  TFP_DB_PATH = '/data/tfp.db'
  TFP_IPFS_API_URL = ''
  TFP_REDIS_URL = ''
  NOSTR_RELAY_URL = 'wss://relay.damus.io'

[mounts]
  source = 'tfp_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
