[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "tfp"
version = "2.2.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "python-ndn",
    "websockets",
    "prometheus_client",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]
[project.scripts]
tfp = "tfp_cli.main:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
